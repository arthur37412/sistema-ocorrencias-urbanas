<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Ocorrências Urbanas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet"> <!---temporario-->
	
	<!--css-->
	<link rel="stylesheet" href="/css/style.css">
	<!--leaflet-->
	<link rel="stylesheet" href="/css/leaflet.css">
	     
</head>

<body>

		<header class="header">
      <nav>
        <h1 class="text-left">
            Sistema de Ocorrências Urbanas
        </h1>
		
		<div class = "area-direita">
		
		<div th:if="${usuario == null or usuario.tipoUsuario == 'Usuario'}">
		<button id = "btnRegistrar">
			Criar registro
		</button>
		</div>
		<div th:if="${usuario != null and (usuario.tipoUsuario == 'Gestor' or usuario.tipoUsuario == 'Administrador') }">
		    <button id="btnCriarObra">
		        Criar Obra
		    </button>
		</div>
		
		
		<div th:if="${usuario == null}">
		    <a th:href="@{/login}" class="botao-login">
		        Entrar
		    </a>
		</div>

		
		
		<div th:if="${usuario != null}"
		     class="dropdown-usuario">

		    <button class="botao-dropdown">

		        <img src="/images/user.png"
		             class="icone-usuario">

		        <span th:text="${usuario.nomeUsuario}">
		        </span>

		    </button>

		
		<div class="menu-dropdown">
		        <a href="#">
		            Perfil
		        </a>
				
		        <a href="#">
		            Minhas Ocorrências
		        </a>
				
		        <a th:href="@{/sair}">
		            Sair
		        </a>

		    </div>
			
	    </div>
	
		</nav>
		</header>
		
		<div id="map"></div>
		
		
		<!-- popup registrar -->
		<div id="popupRegistro" class="popup-registro">

		    <h3>
		        Novo Registro
		    </h3>

		    <input type="text" id="tituloRegistro" placeholder="Resumo">

		    <textarea id="descricaoRegistro" placeholder="Descrição"></textarea>

		    <div class="grupo-campos">
		        <label>
		            Tipo
		        </label>
		        <div class="opcoes">
		            <label>
		            <input type="radio" name="tipoRegistro" value="ObraVia">
		             Obra em via
		            </label>

		            <label>
		            <input type="radio" name="tipoRegistro" value="OcorrenciaVia">
		             Ocorrência em via
		            </label>

		            <label>
		            <input type="radio" name="tipoRegistro" value="ObraPredio">
		             Obra em prédio
		            </label>

		        </div>
		    </div>


		    
		    <div id="camposVia">
		       
		        <div class="grupo-campos">
		            <label>
		             Tráfego de veículos
		            </label>

		            <div class="opcoes">

		                <label>
		                 <input type="radio" name="trafegoV" value="NaoImpede">
		                  Não impede
		                </label>

		                <label>
		                <input type="radio" name="trafegoV" value="Dificulta">
		                 Dificulta
		                </label>

		                <label>
		                <input type="radio" name="trafegoV" value="Impede">
		                 Impede
		                </label>

		            </div>
					
		        </div>


		        <div class="grupo-campos">
		            <label>
		             Tráfego de pedestres
		            </label>

		            <div class="opcoes">

		                <label>
		                <input type="radio" name="trafegoP" value="NaoImpede">
		                 Não impede
		                </label>

		                <label>
		                <input type="radio" name="trafegoP" value="Dificulta">
		                 Dificulta
		                </label>

		                <label>
		                <input type="radio" name="trafegoP" value="Impede">
		                 Impede
		                </label>

		            </div>
					
		        </div>

		    </div>


		    
		    <div id="camposPredio">
		        <div class="grupo-campos">

		            <label>
		             Funcionamento
		            </label>

		            <div class="opcoes">

		                <label>
		                <input type="radio" name="funcionamento" value="Pleno">
		                 Pleno funcionamento
		                </label>

		                <label>
		                <input type="radio" name="funcionamento" value="Parcial">
		                 Funcionamento parcial
		                </label>

		                <label>
		                <input type="radio" name="funcionamento" value="Fechado">
		                 Fechado
		                </label>

		            </div>
					
		        </div>

		    </div>


		    <!-- impactos -->
		    <div class="grupo-campos">

		        <label>
		            Impactos
		        </label>

		        <div class="opcoes-checkbox">

		            <label>
		            <input type="checkbox" id="ruidoExcessivo">
		             Ruído excessivo
		            </label>

		            <label>
		            <input type="checkbox" id="poeiraExcessiva">
		             Poeira excessiva
		            </label>

		            <label>
		            <input type="checkbox" id="entulho">
		             Entulho
		            </label>

		        </div>
				
		    </div>


		    <button id="btnSalvarRegistro">
		     Registrar
		    </button>

		</div>
		
		<!--rodape-->
		<footer>
		  Footer
	    </footer>
		
		<div id="popupCriar" class="popup">
		    Selecione o local afetado no mapa.
		</div>
		
	     <!--javascript-->
		 <script src="/js/leaflet.js"></script>
		 <script src="/js/mapa.js"></script>
		 <script src="/js/script.js"></script>
		 
		
</body>

</html>
